# Configuration for GitHub's automatically generated release notes.
# See https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
changelog:
  exclude:
    labels:
      - wontfix
  categories:
    - title: New Features 🎉
      labels:
        - enhancement
    - title: Bugfixes 🐛
      labels:
        - bug
    - title: Documentation 📖
      labels:
        - documentation
    - title: Maintenance 🔧
      labels:
        - "*"
