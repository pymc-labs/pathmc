name: CI Docs

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-docs:
    name: "Build Docs"
    runs-on: ubuntu-latest
    # Notebooks are NOT executed in CI. Project-level `freeze: true` in
    # great-docs.yml plus the committed `_freeze/` cache means Quarto restores
    # cached outputs and renders HTML only — no kernel ever spawns here.
    # Authors refresh the cache locally via `great-docs freeze <page>` (see
    # docs/dev/great_docs_migration.md, "How freeze works for pathmc").
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for accurate page timestamps

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install package and dependencies
        # uv sync installs the locked dependency set from uv.lock (same as
        # `make setup`), so CI resolves the exact versions used in local dev.
        run: uv sync --all-extras

      - name: Register `pathmc` Jupyter kernel
        # `.qmd` files (and great-docs.yml) declare `jupyter: pathmc`, so the
        # CI runner needs a kernelspec under that name pointing at the same
        # Python interpreter the package was installed into above.
        run: uv run python -m ipykernel install --user --name pathmc

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Build docs
        run: uv run great-docs build

      - name: Verify agent-context files were generated
        # great-docs builds llms.txt / llms-full.txt / skill.md at build step 3,
        # but llms-full.txt is written only if `import pathmc` succeeds at build
        # time, and that import failure is swallowed (the step still reports
        # success). Assert the files landed in _site so a silent skip fails CI
        # instead of shipping an incomplete site. These are required outputs per
        # docs/dev/great_docs_migration.md acceptance criteria.
        run: |
          for f in llms.txt llms-full.txt skill.md; do
            if [[ ! -s "great-docs/_site/$f" ]]; then
              echo "::error::great-docs/_site/$f missing or empty after build"
              exit 1
            fi
            echo "OK: $f ($(wc -c < "great-docs/_site/$f") bytes)"
          done

      - name: Save docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: great-docs/_site

  publish-docs:
    name: "Publish Docs"
    runs-on: ubuntu-latest
    needs: "build-docs"
    # TODO: re-enable on launch — see Phase 4b in docs/dev/great_docs_migration.md.
    # On launch day: remove this guard, then configure Settings → Pages → GitHub Actions.
    if: false && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: docs-html
          path: great-docs/_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: great-docs/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
