name: CI Docs

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-docs:
    name: "Build Docs"
    runs-on: ubuntu-latest
    # Notebooks are NOT executed in CI. Project-level `freeze: true` in
    # great-docs.yml plus the committed `_freeze/` cache means Quarto restores
    # cached outputs and renders HTML only — no kernel ever spawns here.
    # Authors refresh the cache locally via `great-docs freeze <page>` (see
    # docs/dev/great_docs_migration.md, "How freeze works for pathmc").
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for accurate page timestamps

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,docs]"

      - name: Register `pathmc` Jupyter kernel
        # `.qmd` files (and great-docs.yml) declare `jupyter: pathmc`, so the
        # CI runner needs a kernelspec under that name pointing at the same
        # Python interpreter the package was installed into above.
        run: python -m ipykernel install --user --name pathmc

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Build docs
        run: great-docs build

      - name: Save docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: great-docs/_site

  publish-docs:
    name: "Publish Docs"
    runs-on: ubuntu-latest
    needs: "build-docs"
    # TODO: re-enable on launch — see Phase 4b in docs/dev/great_docs_migration.md.
    # Also depends on `build-docs` above being re-enabled (which depends on the
    # upstream great-docs freeze-cache work). On launch day, all three guards
    # need to come off in sequence: build-docs → publish-docs → Settings → Pages.
    if: false && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: docs-html
          path: great-docs/_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: great-docs/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  preview-docs:
    name: "Preview Docs"
    runs-on: ubuntu-latest
    needs: "build-docs"
    # TODO: re-enable on launch — see Phase 4b in docs/dev/great_docs_migration.md.
    # The generated preview-docs job is also incomplete (no upload/deploy step)
    # and would need finishing before use.
    if: false && github.event_name == 'pull_request'
    permissions:
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: docs-html
          path: great-docs/_site

      # Start deployment
      - name: Configure pull release name
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          echo "RELEASE_NAME=pr-${{ github.event.number }}" >> $GITHUB_ENV

      - name: Configure branch release name
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          # use branch name, but replace slashes. E.g. feat/a -> feat-a
          echo "RELEASE_NAME=${GITHUB_REF_NAME//\//-}" >> $GITHUB_ENV

      # Deploy
      - name: Create Github Deployment
        uses: bobheadxi/deployments@v1
        id: deployment
        if: ${{ !github.event.pull_request.head.repo.fork }}
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          env: ${{ env.RELEASE_NAME }}
          ref: ${{ github.head_ref }}
          logs: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
