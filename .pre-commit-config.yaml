repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # `_freeze/` is the great-docs/Quarto cache; entries are produced by
      # `great-docs freeze` and (for upstream-provided files like
      # `site_libs/clipboard/clipboard.min.js`) are vendored verbatim.
      # Whitespace/EOL fixups would either churn the cache on every refresh
      # or corrupt third-party assets.
      - id: trailing-whitespace
        exclude_types: [svg]
        exclude: ^_freeze/
      - id: end-of-file-fixer
        exclude_types: [svg]
        exclude: ^_freeze/
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1500"]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        types_or: [python, pyi, jupyter]
        args: [--fix]
      - id: ruff-format
        types_or: [python, pyi, jupyter, text]
        files: \.(py|pyi|ipynb|qmd)$
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
        files: ^pathmc/
        additional_dependencies: [numpy>=1.20, pandas-stubs]
  - repo: https://github.com/usnistgov/pyproject2conda
    rev: v0.22.1
    hooks:
      - id: pyproject2conda-yaml
        name: Sync environment.yml from pyproject.toml
        args:
          - -e
          - dev
          - -e
          - docs
          - -e
          - samplers
          - -o
          - environment.yml
          - -n
          - pathmc
          - -w
          - force
          - --python-include
          - "python=3.12"
          - -r
          - "--editable=.[dev,docs,samplers]"
  - repo: https://github.com/lucianopaz/head_of_apache
    rev: "0.1.1"
    hooks:
      - id: head_of_apache
        args:
          - --author=The PyMC Labs Developers
          - --start-year=2025
          - --exclude=docs/
          # Vendored upstream skills installed via `npx skills add` are MIT
          # licensed (per their own SKILL.md frontmatter) and modifying them
          # would invalidate `skills-lock.json` content hashes used by
          # `great-docs skill check`. Keep them verbatim.
          - --exclude=.agents/
          # Quarto/great-docs freeze cache. Includes upstream-vendored assets
          # like clipboard.js (MIT, © Zeno Rocha) that must not be relicensed.
          - --exclude=_freeze/
