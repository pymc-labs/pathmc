# Great Docs Configuration
# See https://posit-dev.github.io/great-docs/user-guide/03-configuration.html

module: pathmc
display_name: pathmc

# Explicit GitHub repo (auto-detection from pyproject.toml URLs works but is
# silent on failure; pinning it here makes source links and the changelog
# fail loudly if the repo ever moves).
repo: pymc-labs/pathmc
github_style:
  source: true

parser: numpy
dynamic: false  # cyclic alias detected; griffe AST analysis is sufficient

# Re-exports from upstream packages do not belong in our reference.
exclude:
  - Prior

# Use the existing curated landing page from docs/index.qmd (mirrored into
# the user_guide directory below) instead of generating one from README.md.
homepage: user_guide

# Disable generated Markdown page downloads. The copy-page widget eagerly
# fetches the `.md` companion page on load, which makes navigation noticeably
# slower on long executable examples.
markdown_pages: false

# User Guide -----------------------------------------------------------------
# Source directory for the user guide. Files are auto-discovered and ordered
# by filename, so numeric prefixes determine the sidebar order.
user_guide: docs/user_guide

# Custom Sections ------------------------------------------------------------
sections:
  - title: Examples
    # Symlink at repo root: examples -> docs/examples. Great Docs copies
    # sections to great-docs/examples/, which must match the title slug
    # ("examples") for Page Tags scanning. Source content stays under docs/.
    dir: examples
    index: true
    # index_columns is clamped to a max of 2 by great-docs; the grid is
    # responsive (auto-fill) and shows more columns on wide screens anyway.
    index_columns: 2
    navbar_after: User Guide

# Page Tags ------------------------------------------------------------------
# Activates clickable tag pills under each page title and an auto-generated
# tag index page ("Tags" navbar link) that groups pages by tag. Per-page tags
# live in each example's `tags:` frontmatter and are the single source of truth
# for the example taxonomy. Note: tags drive navigation, not in-place filtering —
# clicking a pill jumps to that tag's section on the index page.
tags:
  enabled: true
  icons:
    Causal Inference: git-fork
    do-Operator: zap
    Identification: search
    Backdoor Criterion: shield
    Front-Door Criterion: door-open
    Collider Bias: alert-triangle
    G-Computation: calculator
    Treatment Effects: target
    Counterfactuals: split
    Mediation: route
    Moderation: sliders-horizontal
    Sensitivity Analysis: activity
    Panel Data: table
    Difference-in-Differences: git-compare
    Simulation: dices
    Priors: sliders-horizontal
    Transforms: waves
    Latent Variables: eye-off
    Media Mix Modeling: megaphone
    Hierarchical Effects: layers

# API Reference --------------------------------------------------------------
# Public surface only: top-level constructors, PathModel methods, result/display
# classes returned by those methods, and documented extension points.
# Internal helpers (parse/build/compile/compute functions) are excluded.
reference:
  - title: Modeling
    desc: Build, fit, and query Bayesian path models.
    contents:
      - model.model
      - model.PathModel
  - title: Simulation
    desc: Time-forward and counterfactual simulation helpers.
    contents:
      - model.simulate
      - simulate.DoResult
  - title: Result objects
    desc: Result containers returned by PathModel methods for programmatic inspection.
    contents:
      - effects.EffectResult
      - identify.ImplicationTestResult
      - sensitivity.SensitivityResult
  - title: DAG falsification
    desc: Whole-graph validation via a permutation-based test.
    contents:
      - falsify.falsify_graph
      - falsify.FalsificationResult
  - title: Custom transforms
    desc: Extend the model DSL with domain-specific transformations.
    contents:
      - transforms.Transform
      - transforms.ParamSpec
      - transforms.register_transform

# Site appearance ------------------------------------------------------------
logo:
  light: docs/assets/logo_light.png
  dark: docs/assets/logo_dark.png
favicon: docs/assets/favicon.png
navbar_style: mint
dark_mode_toggle: true
# We use docs/user_guide/00-welcome.qmd as the homepage. It already has its
# own logo/tagline/showcase, so suppress the auto-generated hero block.
hero: false

# Graphviz figure sizing -----------------------------------------------------
# Quarto's {dot} engine defaults the SVG height to equal its width (a square)
# when only fig-width is set, letterboxing wide rankdir=LR DAGs with large
# vertical whitespace. The emitted SVG carries the true aspect ratio in its
# viewbox but also a fixed height attribute that CSS height:auto can't reliably
# override. This script reads the viewbox, drops the fixed height, and sets
# aspect-ratio so every DAG (current and future) sizes to its content. Scoped
# to graphviz via the <g class="graph"> marker so Mermaid/matplotlib SVGs are
# untouched.
include_in_header:
  - text: |
      <script>
      document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll("svg").forEach((svg) => {
          // Graphviz/{dot} SVGs carry a <g class="graph"> marker; this leaves
          // Mermaid and matplotlib SVGs untouched.
          if (!svg.querySelector("g.graph")) return;
          // Read the geometry via the SVGRect, not getAttribute("viewbox"):
          // the HTML parser renames the source "viewbox" to "viewBox", so a
          // lowercase getAttribute returns null.
          const vb = svg.viewBox && svg.viewBox.baseVal;
          if (!vb || !vb.width || !vb.height) return;
          svg.removeAttribute("height");
          svg.style.height = "auto";
          svg.style.maxHeight = "none";
          svg.style.aspectRatio = `${vb.width} / ${vb.height}`;
        });
      });
      </script>

# SEO ------------------------------------------------------------------------
# Public docs URL at pathmc.pymc-labs.com (matches pyproject.toml [project.urls] Documentation).
# Required for sitemap.xml, canonical links, and social-card absolute URLs.
seo:
  canonical:
    base_url: https://pathmc.pymc-labs.com/

# Citations use docs/references.bib via per-page frontmatter until Great Docs
# forwards project-level bibliography (posit-dev/great-docs#214; migrate in #266).
bibliography: docs/references.bib

# Jupyter kernel for executable code cells. Register it from the uv-managed
# venv with: uv run python -m ipykernel install --user --name pathmc
jupyter: pathmc

# Render code-cell figures as 2x PNGs and display them at their logical size.
fig-format: retina

# Freeze cache --------------------------------------------------------------
# Local builds execute and cache; remote builds only render from the committed
# `_freeze/` cache. Refresh after editing a page with `great-docs freeze <page>`.
# `true` (not `auto`) ensures CI never re-executes a page even if its source
# hash drifted: pathmc's MCMC outputs are non-deterministic and pages should
# only be re-executed deliberately via `great-docs freeze`.
freeze: true

# Curated agent SKILL.md (see Phase 3 of the migration plan). Lives inside the
# package directory so it ships in the wheel and `great-docs skill install
# pathmc` resolves it for pip-installed users (issue #209).
skill:
  enabled: true
  file: pathmc/skills/pathmc/SKILL.md
