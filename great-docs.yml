# Great Docs Configuration
# See https://posit-dev.github.io/great-docs/user-guide/03-configuration.html

module: pathmc
display_name: pathmc

# Explicit GitHub repo (auto-detection from pyproject.toml URLs works but is
# silent on failure; pinning it here makes source links and the changelog
# fail loudly if the repo ever moves).
repo: pymc-labs/pathmc
github_style:
  source: true

parser: numpy
dynamic: false  # cyclic alias detected; griffe AST analysis is sufficient

# Re-exports from upstream packages do not belong in our reference.
exclude:
  - Prior

# Use the existing curated landing page from docs/index.qmd (mirrored into
# the user_guide directory below) instead of generating one from README.md.
homepage: user_guide

# User Guide -----------------------------------------------------------------
# Source directory for the user guide. Files are auto-discovered and ordered
# by filename, so numeric prefixes determine the sidebar order.
user_guide: docs/user_guide

# Custom Sections ------------------------------------------------------------
sections:
  - title: Examples
    # Symlink at repo root: examples -> docs/examples. Great Docs copies
    # sections to great-docs/examples/, which must match the title slug
    # ("examples") for Page Tags scanning. Source content stays under docs/.
    dir: examples
    index: true
    # index_columns is clamped to a max of 2 by great-docs; the grid is
    # responsive (auto-fill) and shows more columns on wide screens anyway.
    index_columns: 2
    navbar_after: User Guide

# Page Tags ------------------------------------------------------------------
# Activates clickable tag pills under each page title and an auto-generated
# tag index page ("Tags" navbar link) that groups pages by tag. Per-page tags
# live in each example's `tags:` frontmatter and are the single source of truth
# for the example taxonomy. Note: tags drive navigation, not in-place filtering —
# clicking a pill jumps to that tag's section on the index page.
tags:
  enabled: true
  icons:
    Causal Inference: git-fork
    do-Operator: zap
    Identification: search
    Backdoor Criterion: shield
    Front-Door Criterion: door-open
    Collider Bias: alert-triangle
    G-Computation: calculator
    Treatment Effects: target
    Counterfactuals: split
    Mediation: route
    Moderation: sliders-horizontal
    Sensitivity Analysis: activity
    Panel Data: table
    Difference-in-Differences: git-compare
    Simulation: dices
    Priors: sliders-horizontal
    Transforms: waves
    Latent Variables: eye-off
    Media Mix Modeling: megaphone
    Hierarchical Effects: layers

# API Reference --------------------------------------------------------------
# Public surface only: model() / simulate() / add_lags() and the PathModel
# class with its methods. Internal helpers (build_*, compute_*, etc.) are
# implementation details and excluded.
reference:
  - title: Modeling
    desc: Build, fit, and query Bayesian path models.
    contents:
      - model.model
      - model.PathModel
  - title: Simulation
    desc: Time-forward and counterfactual simulation helpers.
    contents:
      - model.simulate
      - model.DoResult
  - title: Panel data
    desc: Helpers for panel / longitudinal data.
    contents:
      - panel.add_lags

# Site appearance ------------------------------------------------------------
logo: docs/assets/logo.png
navbar_style: mint
dark_mode_toggle: true
# We use docs/user_guide/00-welcome.qmd as the homepage. It already has its
# own logo/tagline/showcase, so suppress the auto-generated hero block.
hero: false

# Bibliography lives in docs/ and is referenced from individual pages.
bibliography: docs/references.bib

# Jupyter kernel for executable code cells. Register it from the uv-managed
# venv with: uv run python -m ipykernel install --user --name pathmc
jupyter: pathmc

# Freeze cache --------------------------------------------------------------
# Local builds execute and cache; remote builds only render from the committed
# `_freeze/` cache. Refresh after editing a page with `great-docs freeze <page>`.
# `true` (not `auto`) ensures CI never re-executes a page even if its source
# hash drifted: pathmc's MCMC outputs are non-deterministic and pages should
# only be re-executed deliberately via `great-docs freeze`.
freeze: true

# Curated agent SKILL.md (see Phase 3 of the migration plan). Lives inside the
# package directory so it ships in the wheel and `great-docs skill install
# pathmc` resolves it for pip-installed users (issue #209).
skill:
  enabled: true
  file: pathmc/skills/pathmc/SKILL.md
